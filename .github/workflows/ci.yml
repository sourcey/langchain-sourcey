name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] build twine

      - name: Run unit tests
        run: PYTHONPATH=src pytest tests/unit_tests -q

      - name: Run live integration test
        if: matrix.python-version == '3.12'
        run: SOURCEY_TEST_SITE_URL=https://sourcey.com/docs PYTHONPATH=src pytest tests/integration_tests/test_live_retriever.py -q

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

  javascript:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: js/package-lock.json

      - name: Install JS dependencies
        working-directory: js
        run: npm ci

      - name: Run JS type checks
        working-directory: js
        run: npm run check

      - name: Run JS tests
        working-directory: js
        run: npm run test

      - name: Run JS live integration test
        working-directory: js
        run: SOURCEY_TEST_SITE_URL=https://sourcey.com/docs npm run test

      - name: Build JS package
        working-directory: js
        run: npm run build
